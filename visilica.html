<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Виселица | Lyez Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    :root {
      --primary: #ffffff;
      --bg: #000000;
      --card-bg: rgba(20, 20, 20, 0.85);
      --grid-color: rgba(255, 255, 255, 0.08);
      --accent: #00ffcc;
      --error: #ff3366;
      --correct: #33ff99;
      --glass-border: 1px solid rgba(255, 255, 255, 0.2);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--primary);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      opacity: 0;
      animation: fadeBody 1s ease forwards;
    }

    @keyframes fadeBody {
      to { opacity: 1; }
    }

    /* Параллакс сетка и слои */
    .parallax-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
    }

    .layer-1 {
      background: 
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(var(--grid-color) 1px, transparent 1px) 0 0 / 20px 20px;
      animation: gridSlowMove 24s infinite linear;
    }

    .layer-2 {
      background: radial-gradient(circle at 30% 40%, rgba(100, 100, 150, 0.08) 0%, transparent 60%),
                  radial-gradient(circle at 70% 85%, rgba(150, 150, 200, 0.05) 0%, transparent 70%);
      animation: slowDrift 18s infinite alternate;
    }

    @keyframes gridSlowMove {
      0% { transform: translate(0,0); }
      100% { transform: translate(20px, 20px); }
    }

    @keyframes slowDrift {
      0% { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.05) translate(-15px, -10px); }
    }

    canvas#particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* Центральное уведомление */
    .center-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 60px;
      padding: 12px 28px;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      z-index: 10000;
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.25s;
      opacity: 0;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      pointer-events: none;
      font-family: monospace;
      letter-spacing: 1px;
    }

    .center-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .center-toast.success { border-left: 4px solid #4caf50; color: #ccffcc; }
    .center-toast.error { border-left: 4px solid #f44336; color: #ffaaaa; }
    .center-toast.warning { border-left: 4px solid #ff9800; color: #ffdd99; }
    .center-toast.correct { border-left: 4px solid #33ff99; color: #aaffdd; }

    @media (max-width: 600px) {
      .center-toast { font-size: 0.9rem; padding: 8px 18px; white-space: normal; text-align: center; max-width: 90vw; }
    }

    /* основной контейнер */
    .game-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 24px 40px;
      position: relative;
      z-index: 2;
      backdrop-filter: blur(3px);
    }

    /* шапка */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 16px;
    }

    .back-home {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: var(--glass-border);
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .back-home:hover {
      background: rgba(255,255,255,0.15);
      transform: translateX(-4px);
      box-shadow: 0 0 12px rgba(0,255,200,0.3);
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 3px;
      text-shadow: 0 0 8px cyan;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* панель управления */
    .controls-panel {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 15px 24px;
      margin-bottom: 32px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .difficulty-selector {
      display: flex;
      gap: 12px;
      background: rgba(0,0,0,0.5);
      padding: 5px 12px;
      border-radius: 60px;
    }

    .difficulty-btn {
      background: transparent;
      border: none;
      color: #aaa;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .difficulty-btn.active {
      background: var(--primary);
      color: black;
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .game-btn {
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .game-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(0.97);
    }

    /* бургер-меню - повышенный z-index и контекст наложения */
    .burger-menu-wrapper {
      position: relative;
      z-index: 2000;
    }

    .burger-icon {
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 40px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .burger-icon:hover {
      background: rgba(255,255,255,0.2);
    }

    .dropdown-menu {
      position: absolute;
      top: 110%;
      right: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 8px 0;
      min-width: 220px;
      z-index: 2001;
      display: none;
      flex-direction: column;
      pointer-events: auto;
    }

    .dropdown-menu.show {
      display: flex;
    }

    .dropdown-item {
      padding: 10px 20px;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dropdown-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .dropdown-item.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* игровые зоны */
    .game-area {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }

    .hangman-area {
      flex: 1.2;
      min-width: 260px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.1s ease;
    }

    canvas#hangmanCanvas {
      background: #010101;
      border-radius: 28px;
      width: 100%;
      max-width: 280px;
      height: auto;
      box-shadow: 0 0 20px rgba(0,255,255,0.1);
    }

    .word-panel {
      flex: 2;
      min-width: 280px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .word-display {
      font-size: 2.2rem;
      letter-spacing: 12px;
      text-align: center;
      font-family: monospace;
      font-weight: bold;
      background: #0a0a0a;
      padding: 20px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
      word-break: break-all;
      transition: all 0.2s ease;
    }

    .word-display.pulse { transform: scale(1.02); text-shadow: 0 0 8px #33ff99; }
    .shake-effect { animation: shake 0.2s ease-in-out 0s 2; }
    @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } 100% { transform: translateX(0); } }
    .win-flash { animation: winGlow 0.5s ease-out; }
    @keyframes winGlow { 0% { background-color: rgba(51, 255, 153, 0); } 30% { background-color: rgba(51, 255, 153, 0.3); box-shadow: 0 0 20px #33ff99; } 100% { background-color: rgba(51, 255, 153, 0); } }
    .lose-flash { animation: loseGlow 0.6s ease-out; }
    @keyframes loseGlow { 0% { background-color: rgba(255, 51, 102, 0); } 30% { background-color: rgba(255, 51, 102, 0.4); } 100% { background-color: rgba(255, 51, 102, 0); } }

    .info-stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 1.1rem;
      background: rgba(0,0,0,0.6);
      padding: 10px 18px;
      border-radius: 40px;
    }

    .wrong-letters {
      color: #ff9f6e;
      background: rgba(0,0,0,0.5);
      padding: 12px;
      border-radius: 28px;
      margin: 15px 0;
      font-size: 1.2rem;
    }

    .keyboard {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .key {
      background: #111;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      width: 48px;
      height: 48px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.1s linear;
      text-transform: uppercase;
    }

    .key:active { transform: scale(0.92); background: #2a2a2a; }
    .key.disabled, .key:disabled { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.3); }

    .message-area {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
      font-size: 1.2rem;
      min-height: 55px;
      background: rgba(0,0,0,0.4);
      border-radius: 40px;
      padding: 8px;
    }

    footer {
      text-align: center;
      margin-top: 45px;
      font-size: 0.8rem;
      color: #555;
    }

    /* модальное окно колеса */
    .wheel-modal {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 260px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 16px;
      z-index: 2100;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 30px rgba(0,255,255,0.2);
      transition: transform 0.2s;
    }

    .wheel-modal.show {
      display: flex;
    }

    .wheel-canvas {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #111;
      box-shadow: 0 0 15px cyan;
    }

    .spin-btn {
      background: linear-gradient(45deg, #ff3366, #ff9933);
      border: none;
      color: white;
      font-weight: bold;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.1s;
    }

    .spin-btn:active { transform: scale(0.96); }
    .close-wheel {
      position: absolute;
      top: 8px;
      right: 12px;
      cursor: pointer;
      font-size: 1.2rem;
      color: #aaa;
    }
    .close-wheel:hover { color: white; }

    @media (max-width: 700px) {
      .game-container { padding: 15px; }
      .word-display { font-size: 1.4rem; letter-spacing: 6px; }
      .key { width: 40px; height: 40px; font-size: 1rem; }
      .wheel-modal { width: 220px; right: 15px; bottom: 15px; }
      .wheel-canvas { width: 150px; height: 150px; }
    }
  </style>
</head>
<body>
  <div class="parallax-layer layer-1"></div>
  <div class="parallax-layer layer-2"></div>
  <canvas id="particleCanvas"></canvas>

  <div id="centerToastContainer" style="position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10000; display: flex; justify-content: center;"></div>

  <div class="game-container">
    <div class="game-header">
      <a href="index.html" class="back-home">← На главное меню</a>
      <h1>ВИСЕЛИЦА</h1>
      <div style="width: 70px;"></div>
    </div>

    <div class="controls-panel">
      <div class="difficulty-selector">
        <button class="difficulty-btn" data-diff="easy">🍃 Лёгкий</button>
        <button class="difficulty-btn active" data-diff="medium">⚡ Средний</button>
        <button class="difficulty-btn" data-diff="hard">🔥 Сложный</button>
      </div>
      <div class="action-buttons">
        <button class="game-btn" id="newGameBtn">🔄 Новая игра</button>
        <div class="burger-menu-wrapper">
          <div class="burger-icon" id="burgerIcon">☰ Меню</div>
          <div class="dropdown-menu" id="dropdownMenu">
            <div class="dropdown-item" id="wheelMenuItem">🎡 Колесо фортуны</div>
            <div class="dropdown-item" id="revealLetterItem">🔍 Открыть случайную букву</div>
            <div class="dropdown-item" id="removeWrongItem">✖️ Снять одну неверную букву</div>
            <div class="dropdown-item" id="hintItem">💡 Подсказка (определение)</div>
          </div>
        </div>
      </div>
    </div>

    <div class="game-area">
      <div class="hangman-area">
        <canvas id="hangmanCanvas" width="300" height="320" style="width:100%; max-width:300px; height:auto;"></canvas>
      </div>
      <div class="word-panel">
        <div class="word-display" id="wordDisplay">_ _ _ _ _</div>
        <div class="info-stats">
          <span>❌ Ошибок: <strong id="mistakesCount">0</strong> / <span id="maxMistakesSpan">6</span></span>
          <span>📖 Сложность: <span id="difficultyLabel">Средний</span></span>
        </div>
        <div class="wrong-letters">
          🚫 Неверные буквы: <span id="wrongLettersList">—</span>
        </div>
        <div class="message-area" id="gameMessage"></div>
      </div>
    </div>

    <div class="keyboard" id="keyboardContainer"></div>
    <footer>Lyez — классика с душой киберспорта</footer>
  </div>

  <!-- Модалка колеса -->
  <div id="wheelModal" class="wheel-modal">
    <span class="close-wheel" id="closeWheel">✖</span>
    <canvas id="wheelCanvas" class="wheel-canvas" width="200" height="200"></canvas>
    <button id="spinWheelBtn" class="spin-btn">Крутить</button>
    <div style="font-size: 0.8rem; text-align: center;">Выпадет случайная буква</div>
  </div>

  <script>
    // ------------------- СЛОВАРИ ------------------
    const WORDS_POOL = {
      easy:   ["кот","дом","лес","мир","сок","год","час","брат","слон","волк","дверь","мышь","ночь","день","путь","луна","снег","дождь","рука","нога","книга","стол","стул","окно","звезда","песня","река","гора","поле","лето","ёлка","ёж","мёд","лёд","зной","хлеб","сон","кит","бык","лев","рой","чай","сад","меч","щит","шар","шум","град","гриб","лист","хвост","лось","перо","крыло","мост","враг","друг","соль","ветер","гром","снегопад"],
      medium: ["собака","корова","машина","улица","работа","дерево","солнце","город","школа","учитель","комната","завтрак","телефон","компьютер","планета","история","молния","ракета","библиотека","корабль","самолет","животное","погода","радуга","квартира","мечта","радость","дружба","секрет","путешествие","красота","природа","музыка","театр","карандаш","тетрадь","пирамида","колокол","победа","огонь","поезд","качели","кресло","костер","закат","восход","часы","месяц","звездопад"],
      hard:   ["автомобиль","велосипед","достопримечательность","интеллект","программирование","обезьяна","электричество","правительство","универмаг","фотография","телевидение","воображение","оригинальный","конфигурация","реставрация","библиография","квалификация","трансформация","авиастроение","кинематограф","параллелепипед","человечность","дезоксирибонуклеиновая","экстраординарный","рефлексия","иллюминация","коммуникабельность","энергоэффективность","архитектура","фундаментальный","лаборатория","эксперимент","биосфера","гипербола","метаморфоза","рекомендация","специализация","университет","инфраструктура"]
    };

    const WORD_HINTS = {
      "автомобиль": "Транспортное средство с двигателем",
      "велосипед": "Двухколёсная машина на педалях",
      "достопримечательность": "Знаменитое место, объект туризма",
      "интеллект": "Способность мыслить и познавать",
      "программирование": "Создание компьютерных программ",
      "обезьяна": "Примат, похожий на человека",
      "электричество": "Форма энергии, ток",
      "правительство": "Орган управления страной",
      "фотография": "Изображение, снимок",
      "телевидение": "Средство массовой информации с экраном",
      "кинематограф": "Искусство кино",
      "параллелепипед": "Геометрическое тело, шесть граней",
      "человечность": "Доброта, гуманность",
      "архитектура": "Искусство проектировать здания",
      "лаборатория": "Место для научных опытов",
      "эксперимент": "Научный опыт, проба",
      "университет": "Высшее учебное заведение"
    };
    function getWordHint(word) {
      const norm = word.toLowerCase().replace(/ё/g, 'е');
      return WORD_HINTS[norm] || "Это слово из русского языка. Попробуй угадать по буквам!";
    }

    // Нормализация
    function normalizeLetter(l) { return l === 'ё' ? 'е' : l; }
    function normalizeWord(word) { return word.split('').map(c => normalizeLetter(c)).join(''); }

    // Состояние игры
    let currentDifficulty = "medium";
    let currentWord = "";
    let normalizedWord = "";
    let guessedLetters = new Set();
    let wrongLetters = new Set();
    let maxMistakes = 7;
    let hangmanSteps = 0;
    let gameActive = true;

    let usedRevealLetter = false;
    let usedRemoveWrong = false;
    let usedHint = false;

    // DOM элементы
    const wordDisplaySpan = document.getElementById("wordDisplay");
    const mistakesSpan = document.getElementById("mistakesCount");
    const maxMistakesSpan = document.getElementById("maxMistakesSpan");
    const wrongLettersSpan = document.getElementById("wrongLettersList");
    const gameMessageDiv = document.getElementById("gameMessage");
    const hangmanCanvas = document.getElementById("hangmanCanvas");
    const ctx = hangmanCanvas.getContext("2d");
    const difficultyLabelSpan = document.getElementById("difficultyLabel");
    const newGameBtn = document.getElementById("newGameBtn");
    const hangmanArea = document.querySelector(".hangman-area");

    // Уведомления
    function showCenterToast(message, type = "info", duration = 2000) {
      const container = document.getElementById("centerToastContainer");
      const toast = document.createElement("div");
      toast.className = `center-toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add("show"));
      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    // Получение слова по сложности и длине
    function getWordByDifficulty(diff) {
      let pool = WORDS_POOL[diff];
      let minLen = 1, maxLen = 20;
      if (diff === "easy") { minLen = 1; maxLen = 5; }
      else if (diff === "medium") { minLen = 5; maxLen = 8; }
      else { minLen = 8; maxLen = 30; }
      const filtered = pool.filter(w => w.length >= minLen && w.length <= maxLen);
      return filtered.length ? filtered[Math.floor(Math.random() * filtered.length)] : pool[0];
    }

    function initNewWord() {
      currentWord = getWordByDifficulty(currentDifficulty);
      normalizedWord = normalizeWord(currentWord);
    }

    function resetGame() {
      initNewWord();
      guessedLetters.clear();
      wrongLetters.clear();
      hangmanSteps = 0;
      gameActive = true;
      mistakesSpan.innerText = "0";
      updateWrongLettersList();
      drawHangman(0);
      updateWordDisplay();
      gameMessageDiv.innerHTML = "✨ Новая игра! Введи букву ✨";
      refreshKeyboardButtons();
      usedRevealLetter = false;
      usedRemoveWrong = false;
      usedHint = false;
      updateMenuItemsState();
      showCenterToast("Новая игра! Удачи!", "info", 1500);
    }

    function setDifficulty(level) {
      currentDifficulty = level;
      let label = "", mistakes = 6;
      if (level === "easy") { label = "Лёгкий"; mistakes = 6; }
      else if (level === "medium") { label = "Средний"; mistakes = 7; }
      else { label = "Сложный"; mistakes = 8; }
      maxMistakes = mistakes;
      maxMistakesSpan.innerText = maxMistakes;
      difficultyLabelSpan.innerText = label;
      document.querySelectorAll(".difficulty-btn").forEach(btn => {
        if (btn.getAttribute("data-diff") === level) btn.classList.add("active");
        else btn.classList.remove("active");
      });
      resetGame();
      showCenterToast(`Сложность: ${label} (попыток: ${maxMistakes})`, "info", 1500);
    }

    function updateWordDisplay() {
      let display = "";
      for (let i = 0; i < currentWord.length; i++) {
        const origChar = currentWord[i];
        const normChar = normalizeLetter(origChar);
        display += (guessedLetters.has(normChar) ? origChar : "_") + " ";
      }
      wordDisplaySpan.innerText = display.trim() || "___";
    }

    function updateWrongLettersList() {
      const arr = Array.from(wrongLetters).join(", ");
      wrongLettersSpan.innerText = arr.length ? arr : "—";
    }

    function drawHangman(errors) {
      ctx.clearRect(0, 0, hangmanCanvas.width, hangmanCanvas.height);
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(50, 280); ctx.lineTo(250, 280);
      ctx.moveTo(100, 280); ctx.lineTo(100, 40); ctx.lineTo(200, 40); ctx.lineTo(200, 70);
      ctx.stroke();
      if(errors >= 1) { ctx.beginPath(); ctx.arc(200, 95, 22, 0, Math.PI*2); ctx.stroke(); }
      if(errors >= 2) { ctx.beginPath(); ctx.moveTo(200, 117); ctx.lineTo(200, 190); ctx.stroke(); }
      if(errors >= 3) { ctx.beginPath(); ctx.moveTo(200, 140); ctx.lineTo(170, 165); ctx.stroke(); }
      if(errors >= 4) { ctx.beginPath(); ctx.moveTo(200, 140); ctx.lineTo(230, 165); ctx.stroke(); }
      if(errors >= 5) { ctx.beginPath(); ctx.moveTo(200, 190); ctx.lineTo(175, 235); ctx.stroke(); }
      if(errors >= 6) { ctx.beginPath(); ctx.moveTo(200, 190); ctx.lineTo(225, 235); ctx.stroke(); }
      if(errors === maxMistakes && maxMistakes > 6) {
        ctx.fillStyle = "#ff3366";
        ctx.font = "bold 16px monospace";
        ctx.fillText("💀", 180, 270);
      }
    }

    function animateCorrectLetter() { wordDisplaySpan.classList.add("pulse"); setTimeout(() => wordDisplaySpan.classList.remove("pulse"), 200); }
    function animateMistake() { hangmanArea.classList.add("shake-effect"); setTimeout(() => hangmanArea.classList.remove("shake-effect"), 300); }
    function winEffect() { document.querySelector(".word-panel").classList.add("win-flash"); setTimeout(() => document.querySelector(".word-panel").classList.remove("win-flash"), 500); showCenterToast("🎉 ПОБЕДА! Вы спасли висельника! 🎉", "success", 3000); gameMessageDiv.innerHTML = "🎉 ПОБЕДА! 🎉 <span style='color:#33ff99'>Ты спас висельника!</span>"; }
    function loseEffect() { document.querySelector(".word-panel").classList.add("lose-flash"); setTimeout(() => document.querySelector(".word-panel").classList.remove("lose-flash"), 600); showCenterToast(`💀 ПОРАЖЕНИЕ! Слово: ${currentWord.toUpperCase()} 💀`, "error", 4000); gameMessageDiv.innerHTML = `💀 ПОРАЖЕНИЕ! Загадано слово: <strong style="color:#ff9966">${currentWord.toUpperCase()}</strong> 💀`; }

    function checkGameStatus() {
      const allGuessed = [...normalizedWord].every(ch => guessedLetters.has(ch));
      if (allGuessed && gameActive) {
        gameActive = false;
        winEffect();
        disableKeyboard(true);
        updateMenuItemsState();
        return true;
      }
      if (hangmanSteps >= maxMistakes && gameActive) {
        gameActive = false;
        loseEffect();
        disableKeyboard(true);
        updateMenuItemsState();
        return true;
      }
      return false;
    }

    function guessLetter(rawLetter) {
      if (!gameActive) return false;
      const letter = normalizeLetter(rawLetter);
      if (guessedLetters.has(letter) || wrongLetters.has(letter)) {
        showCenterToast(`Буква "${rawLetter.toUpperCase()}" уже была`, "warning", 1200);
        return false;
      }
      if (normalizedWord.includes(letter)) {
        guessedLetters.add(letter);
        updateWordDisplay();
        animateCorrectLetter();
        showCenterToast(`✅ Есть буква "${rawLetter.toUpperCase()}"!`, "correct", 1000);
        checkGameStatus();
        return true;
      } else {
        wrongLetters.add(letter);
        hangmanSteps++;
        mistakesSpan.innerText = hangmanSteps;
        updateWrongLettersList();
        drawHangman(hangmanSteps);
        animateMistake();
        showCenterToast(`❌ Нет буквы "${rawLetter.toUpperCase()}"`, "error", 1200);
        checkGameStatus();
        return false;
      }
    }

    // Подсказки
    function revealRandomLetter() {
      if (!gameActive) { showCenterToast("Игра окончена, начните новую", "warning"); return; }
      if (usedRevealLetter) { showCenterToast("Вы уже использовали эту подсказку", "warning"); return; }
      const missing = [];
      for (let i = 0; i < normalizedWord.length; i++) {
        const letter = normalizedWord[i];
        if (!guessedLetters.has(letter) && !missing.includes(letter)) missing.push(letter);
      }
      if (missing.length === 0) { showCenterToast("Все буквы уже открыты!", "info"); return; }
      const randomLetter = missing[Math.floor(Math.random() * missing.length)];
      guessedLetters.add(randomLetter);
      updateWordDisplay();
      animateCorrectLetter();
      showCenterToast(`🔍 Открыта буква "${randomLetter.toUpperCase()}"`, "correct", 2000);
      usedRevealLetter = true;
      updateMenuItemsState();
      refreshKeyboardButtons();
      checkGameStatus();
    }

    function removeWrongLetter() {
      if (!gameActive) { showCenterToast("Игра окончена, начните новую", "warning"); return; }
      if (usedRemoveWrong) { showCenterToast("Вы уже использовали эту подсказку", "warning"); return; }
      if (wrongLetters.size === 0) { showCenterToast("Нет неверных букв для удаления", "warning"); return; }
      const toRemove = Array.from(wrongLetters)[Math.floor(Math.random() * wrongLetters.size)];
      wrongLetters.delete(toRemove);
      if (hangmanSteps > 0) {
        hangmanSteps--;
        mistakesSpan.innerText = hangmanSteps;
        drawHangman(hangmanSteps);
      }
      updateWrongLettersList();
      showCenterToast(`✖️ Удалена буква "${toRemove.toUpperCase()}"`, "success", 2000);
      usedRemoveWrong = true;
      updateMenuItemsState();
      refreshKeyboardButtons();
      checkGameStatus();
    }

    function showWordHint() {
      if (!gameActive) { showCenterToast("Игра окончена, начните новую", "warning"); return; }
      if (usedHint) { showCenterToast("Вы уже использовали подсказку", "warning"); return; }
      const hint = getWordHint(currentWord);
      showCenterToast(`💡 Определение: ${hint}`, "info", 4000);
      usedHint = true;
      updateMenuItemsState();
    }

    function updateMenuItemsState() {
      const revealItem = document.getElementById("revealLetterItem");
      const removeItem = document.getElementById("removeWrongItem");
      const hintItem = document.getElementById("hintItem");
      const wheelItem = document.getElementById("wheelMenuItem");
      if (!gameActive) {
        revealItem.classList.add("disabled");
        removeItem.classList.add("disabled");
        hintItem.classList.add("disabled");
        wheelItem.classList.add("disabled");
      } else {
        if (usedRevealLetter) revealItem.classList.add("disabled");
        else revealItem.classList.remove("disabled");
        if (usedRemoveWrong) removeItem.classList.add("disabled");
        else removeItem.classList.remove("disabled");
        if (usedHint) hintItem.classList.add("disabled");
        else hintItem.classList.remove("disabled");
        wheelItem.classList.remove("disabled");
      }
    }

    // Клавиатура
    const RUSSIAN_ALPHABET = "абвгдежзийклмнопрстуфхцчшщъыьэюя".split("");
    let keyboardButtons = [];
    function buildKeyboard() {
      const container = document.getElementById("keyboardContainer");
      container.innerHTML = "";
      keyboardButtons = [];
      RUSSIAN_ALPHABET.forEach(letter => {
        const btn = document.createElement("button");
        btn.innerText = letter.toUpperCase();
        btn.classList.add("key");
        btn.setAttribute("data-letter", letter);
        btn.addEventListener("click", () => {
          if (!gameActive) { showCenterToast("Игра окончена, начните новую", "warning"); return; }
          if (guessedLetters.has(letter) || wrongLetters.has(letter)) { showCenterToast(`Буква "${letter.toUpperCase()}" уже использовалась`, "warning", 1000); return; }
          guessLetter(letter);
          refreshKeyboardButtons();
        });
        container.appendChild(btn);
        keyboardButtons.push(btn);
      });
    }
    function refreshKeyboardButtons() {
      keyboardButtons.forEach(btn => {
        const letter = btn.getAttribute("data-letter");
        btn.disabled = guessedLetters.has(letter) || wrongLetters.has(letter);
        if (btn.disabled) btn.classList.add("disabled");
        else btn.classList.remove("disabled");
      });
    }
    function disableKeyboard(disabled) {
      keyboardButtons.forEach(btn => { btn.disabled = disabled; if(disabled) btn.classList.add("disabled"); });
    }

    // Физическая клавиатура
    function handlePhysicalKey(e) {
      if (!gameActive) return;
      let key = e.key.toLowerCase();
      if (key.length === 1 && /[а-яё]/i.test(key)) {
        e.preventDefault();
        const letter = key;
        if (guessedLetters.has(normalizeLetter(letter)) || wrongLetters.has(normalizeLetter(letter))) { showCenterToast(`Буква "${letter.toUpperCase()}" уже была`, "warning", 1000); return; }
        guessLetter(letter);
        refreshKeyboardButtons();
      }
    }

    // Колесо фортуны
    let wheelCanvas = document.getElementById("wheelCanvas");
    let wheelCtx = wheelCanvas.getContext("2d");
    let spinning = false;
    let wheelSegments = [];
    let currentAngle = 0;
    function initWheel() {
      wheelSegments = RUSSIAN_ALPHABET.filter(l => !guessedLetters.has(l) && !wrongLetters.has(l));
      drawWheel();
    }
    function drawWheel() {
      if (!wheelCanvas || wheelSegments.length === 0) return;
      const size = wheelCanvas.width;
      const center = size/2;
      const radius = size/2 - 5;
      const angleStep = (Math.PI * 2) / wheelSegments.length;
      wheelCtx.clearRect(0, 0, size, size);
      for (let i = 0; i < wheelSegments.length; i++) {
        const start = currentAngle + i * angleStep;
        const end = start + angleStep;
        wheelCtx.beginPath();
        wheelCtx.moveTo(center, center);
        wheelCtx.arc(center, center, radius, start, end);
        wheelCtx.fillStyle = `hsl(${i * 360 / wheelSegments.length}, 70%, 55%)`;
        wheelCtx.fill();
        wheelCtx.strokeStyle = "#fff";
        wheelCtx.stroke();
        wheelCtx.save();
        wheelCtx.translate(center, center);
        wheelCtx.rotate(start + angleStep/2);
        wheelCtx.fillStyle = "#000";
        wheelCtx.font = "bold 16px monospace";
        wheelCtx.fillText(wheelSegments[i].toUpperCase(), radius-20, 8);
        wheelCtx.restore();
      }
      wheelCtx.beginPath();
      wheelCtx.moveTo(size-10, center-8);
      wheelCtx.lineTo(size, center);
      wheelCtx.lineTo(size-10, center+8);
      wheelCtx.fillStyle = "#ffaa33";
      wheelCtx.fill();
    }
    async function spinWheel() {
      if (spinning) return;
      const available = RUSSIAN_ALPHABET.filter(l => !guessedLetters.has(l) && !wrongLetters.has(l));
      if (available.length === 0) { showCenterToast("Все буквы уже использованы!", "warning", 2000); return; }
      if (!gameActive) { showCenterToast("Игра окончена, начните новую игру", "warning"); return; }
      spinning = true;
      const spinDuration = 1500;
      const startTime = performance.now();
      const startAngle = currentAngle;
      const fullRotations = 6 * Math.PI * 2;
      const randomFinalOffset = Math.random() * Math.PI * 2;
      const finalAngle = startAngle + fullRotations + randomFinalOffset;
      function animateSpin(now) {
        const elapsed = now - startTime;
        let t = Math.min(1, elapsed / spinDuration);
        const easeOut = 1 - Math.pow(1 - t, 3);
        currentAngle = startAngle + (finalAngle - startAngle) * easeOut;
        drawWheel();
        if (t < 1) requestAnimationFrame(animateSpin);
        else {
          const angleNorm = (currentAngle % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
          const segmentAngle = (Math.PI*2)/wheelSegments.length;
          let selectedIndex = Math.floor(angleNorm / segmentAngle) % wheelSegments.length;
          const selectedLetter = wheelSegments[selectedIndex];
          spinning = false;
          showCenterToast(`🎡 Выпала буква: ${selectedLetter.toUpperCase()}`, "info", 1500);
          guessLetter(selectedLetter);
          refreshKeyboardButtons();
          setTimeout(() => { initWheel(); drawWheel(); }, 300);
        }
      }
      requestAnimationFrame(animateSpin);
    }

    // Частицы (разноцветные, оптимизированные)
    function initParticles() {
      const canvas = document.getElementById('particleCanvas');
      if(!canvas) return;
      const ctxP = canvas.getContext('2d');
      let particles = [], width, height;
      function resizeCanvas() { width = window.innerWidth; height = Math.max(document.body.scrollHeight, window.innerHeight); canvas.width = width; canvas.height = height; }
      class Particle {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.size = Math.random() * 2.5 + 0.5;
          this.speedX = (Math.random() - 0.5) * 0.5;
          this.speedY = (Math.random() - 0.5) * 0.3;
          this.color = `hsl(${Math.random() * 360}, 80%, 65%)`;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if(this.x < 0) this.x = width;
          if(this.x > width) this.x = 0;
          if(this.y < 0) this.y = height;
          if(this.y > height) this.y = 0;
        }
        draw() {
          ctxP.beginPath();
          ctxP.arc(this.x, this.y, this.size, 0, Math.PI*2);
          ctxP.fillStyle = this.color;
          ctxP.fill();
        }
      }
      function init() { resizeCanvas(); particles = []; for(let i=0;i<150;i++) particles.push(new Particle()); }
      function animate() { ctxP.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
      window.addEventListener('resize', () => { resizeCanvas(); init(); });
      window.addEventListener('scroll', () => { resizeCanvas(); });
      init(); animate();
    }

    // Инициализация UI и обработчиков
    function start() {
      buildKeyboard();
      setDifficulty("medium");
      window.addEventListener("keydown", handlePhysicalKey);
      initParticles();
      drawHangman(0);
      updateMenuItemsState();
    }

    // Обработчики бургер-меню
    const burgerIcon = document.getElementById("burgerIcon");
    const dropdown = document.getElementById("dropdownMenu");
    document.getElementById("wheelMenuItem").addEventListener("click", () => {
      dropdown.classList.remove("show");
      if (!gameActive) { showCenterToast("Игра не активна, начните новую", "warning"); return; }
      initWheel();
      drawWheel();
      document.getElementById("wheelModal").classList.add("show");
    });
    document.getElementById("revealLetterItem").addEventListener("click", () => { dropdown.classList.remove("show"); revealRandomLetter(); });
    document.getElementById("removeWrongItem").addEventListener("click", () => { dropdown.classList.remove("show"); removeWrongLetter(); });
    document.getElementById("hintItem").addEventListener("click", () => { dropdown.classList.remove("show"); showWordHint(); });
    document.getElementById("closeWheel").addEventListener("click", () => document.getElementById("wheelModal").classList.remove("show"));
    document.getElementById("spinWheelBtn").addEventListener("click", () => spinWheel());
    burgerIcon.addEventListener("click", (e) => { e.stopPropagation(); dropdown.classList.toggle("show"); });
    document.addEventListener("click", (e) => { if (!burgerIcon.contains(e.target)) dropdown.classList.remove("show"); });
    document.querySelectorAll(".difficulty-btn").forEach(btn => btn.addEventListener("click", () => setDifficulty(btn.getAttribute("data-diff"))));
    newGameBtn.addEventListener("click", () => resetGame());

    start();
  </script>
</body>
</html>
