<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.png">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>My Moments — Lyez</title>
  <meta name="description" content="Видео моменты Lyez в CS2 — с YouTube, жестами и звуковым фоном">
  <style>
    /* ========== ОСНОВНЫЕ ПЕРЕМЕННЫЕ (как в index.html) ========== */
    :root {
      --primary-color: #ffffff;
      --bg-color: #000000;
      --card-bg: #1a1a1a;
      --grid-color: rgba(255, 255, 255, 0.1);
      --accent-color: #7e57c2;
      --toast-success: #4CAF50;
      --toast-error: #f44336;
      --toast-warning: #ff9800;
      --toast-info: #2196F3;
    }

    [data-theme="light"] {
      --primary-color: #000000;
      --bg-color: #ffffff;
      --card-bg: #f5f5f5;
      --grid-color: rgba(0, 0, 0, 0.1);
      --accent-color: #5e35b1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg-color);
      color: var(--primary-color);
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      opacity: 0;
      transition: opacity 1s ease, background-color 0.5s ease, color 0.5s ease;
      position: relative;
      touch-action: pan-y pinch-zoom; /* разрешаем вертикальный скролл, жесты обработаем сами */
      perspective: 1000px;
    }

    body.loaded {
      opacity: 1;
    }

    /* ПАРАЛЛАКС СЛОИ */
    .parallax-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
    }

    .layer-1 {
      background: 
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(var(--grid-color) 1px, transparent 1px) 0 0 / 20px 20px;
      animation: gridMove 20s linear infinite;
      transform: translateZ(-200px) scale(3);
    }

    .layer-2 {
      background: 
        radial-gradient(circle at 20% 50%, rgba(120, 120, 120, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(80, 80, 80, 0.1) 0%, transparent 50%);
      transform: translateZ(-100px) scale(2);
    }

    @keyframes gridMove {
      0% { transform: translateZ(-200px) scale(3) translate(0, 0); }
      25% { transform: translateZ(-200px) scale(3) translate(-1px, 1px); }
      50% { transform: translateZ(-200px) scale(3) translate(1px, -1px); }
      75% { transform: translateZ(-200px) scale(3) translate(-1px, -1px); }
      100% { transform: translateZ(-200px) scale(3) translate(0, 0); }
    }

    /* CANVAS для частиц (динамический фон) */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* БУРГЕР МЕНЮ (как в index.html) */
    .burger {
      position: fixed;
      top: 10px;
      right: 15px;
      width: 30px;
      height: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      z-index: 1001;
      transform: translateZ(0);
    }

    .burger span {
      display: block;
      height: 4px;
      background: var(--primary-color);
      border-radius: 2px;
      transition: all 0.4s cubic-bezier(0.68, -0.6, 0.32, 1.6);
      transform-origin: center;
    }

    .burger.active span:nth-child(2) {
      transform: translateX(100px);
      opacity: 0;
    }
    .burger.active span:nth-child(1) {
      transform: rotate(45deg) translate(6px, 6px);
    }
    .burger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    /* МЕНЮ */
    .menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 280px;
      height: 100%;
      background: rgba(0, 0, 0, 0.98);
      backdrop-filter: blur(10px);
      box-shadow: -2px 0 15px rgba(255, 255, 255, 0.1);
      transition: right 0.4s ease;
      z-index: 1000;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-left: 1px solid var(--grid-color);
      overflow-y: auto;
    }
    [data-theme="light"] .menu {
      background: rgba(255, 255, 255, 0.98);
    }
    .menu.active {
      right: 0;
    }
    .menu-content {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .menu-btn, .menu-link {
      color: var(--primary-color);
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.3s;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      padding: 14px 16px;
      font-family: inherit;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-btn:hover, .menu-link:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .submenu {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.4s ease;
      opacity: 0;
    }
    .submenu a, .submenu .video-item {
      font-size: 1rem;
      padding-left: 25px;
      color: #ccc;
      transform: translateX(-8px);
      opacity: 0;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 4px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      cursor: pointer;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
    }
    .submenu.show {
      max-height: 500px;
      opacity: 1;
    }
    .submenu.show a, .submenu.show .video-item {
      transform: translateX(0);
      opacity: 1;
    }
    .menu-icon {
      font-size: 1.1rem;
      transition: transform 0.3s ease;
    }
    .menu-btn.active .menu-icon {
      transform: rotate(90deg);
    }

    /* ОСНОВНОЙ ПЛЕЕР */
    .video-gallery {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 100px 20px 80px;
    }
    .player-container {
      max-width: 1000px;
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border: 1px solid var(--grid-color);
    }
    [data-theme="light"] .player-container {
      background: rgba(255, 255, 255, 0.7);
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      margin-bottom: 20px;
      aspect-ratio: 16 / 9;
    }
    video, .youtube-iframe {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }
    .control-buttons {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .ctrl-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: var(--primary-color);
      font-size: 1.1rem;
      padding: 8px 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .ctrl-btn:hover {
      background: var(--accent-color);
      color: white;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--accent-color);
      border-radius: 10px;
      transition: width 0.1s linear;
    }
    .time-display {
      font-size: 0.9rem;
      font-family: monospace;
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 10px;
      border-radius: 30px;
    }
    .video-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .back-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: var(--card-bg);
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
      padding: 10px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.9rem;
      z-index: 1001;
    }
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      padding: 10px 18px;
      border-radius: 12px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      color: white;
      transform: translateX(400px);
      opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }
    @media (max-width: 700px) {
      .controls { flex-direction: column; align-items: stretch; }
      .control-buttons { justify-content: center; }
      .ctrl-btn { padding: 8px 12px; font-size: 0.9rem; }
    }
    /* Кастомный курсор (опционально) */
    body.custom-cursor { cursor: none; }
    .custom-cursor-element {
      position: fixed;
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      display: none;
    }
    body.custom-cursor .custom-cursor-element { display: block; }
    .cursor-dot { width: 4px; height: 4px; background: var(--primary-color); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .cursor-circle { width: 24px; height: 24px; border: 1px solid var(--primary-color); border-radius: 50%; position: absolute; top: 0; left: 0; opacity: 0.6; }
    @media (hover: none) { .custom-cursor-element { display: none !important; } }
  </style>
</head>
<body>
  <div class="parallax-layer layer-1"></div>
  <div class="parallax-layer layer-2"></div>
  <canvas id="particleCanvas"></canvas>
  <div class="custom-cursor-element"><div class="cursor-dot"></div><div class="cursor-circle"></div></div>
  <button class="back-btn" onclick="goBack()">← Назад</button>
  <div class="burger" id="burgerBtn"><span></span><span></span><span></span></div>
  <div class="menu" id="menu">
    <div class="menu-content">
      <button class="menu-btn" id="momentsFolderBtn" onclick="toggleSubmenu('momentsSubmenu', this)">📁 Мои моменты<span class="menu-icon">›</span></button>
      <div class="submenu" id="momentsSubmenu"></div>
      <button class="menu-btn" onclick="toggleSubmenu('settingsSubmenu', this)">⚙️ Настройки<span class="menu-icon">›</span></button>
      <div class="submenu" id="settingsSubmenu">
        <div style="display: flex; justify-content: space-between; padding: 10px 16px;"><span>Тема:</span><label class="toggle-switch" style="position:relative; width:50px; height:24px;"><input type="checkbox" id="themeToggle"><span style="position:absolute; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:24px;"></span><span style="position:absolute; width:16px; height:16px; left:4px; bottom:4px; background:white; border-radius:50%; transition:.4s;"></span></label></div>
        <div style="display: flex; justify-content: space-between; padding: 10px 16px;"><span>Прицел-курсор:</span><label class="toggle-switch" style="position:relative; width:50px; height:24px;"><input type="checkbox" id="cursorToggle"><span style="position:absolute; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:24px;"></span><span style="position:absolute; width:16px; height:16px; left:4px; bottom:4px; background:white; border-radius:50%; transition:.4s;"></span></label></div>
      </div>
    </div>
  </div>
  <div class="video-gallery">
    <div class="player-container">
      <div class="video-title" id="currentVideoTitle">Загрузка моментов...</div>
      <div class="video-wrapper" id="videoWrapper">
        <div id="playerContainer" style="width:100%; height:100%;"></div>
      </div>
      <div class="controls">
        <div class="control-buttons">
          <button class="ctrl-btn" id="prevBtn">⏮ Пред.</button>
          <button class="ctrl-btn" id="playPauseBtn">▶ Воспр.</button>
          <button class="ctrl-btn" id="nextBtn">След. ⏭</button>
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // ==================== ПЛЕЙЛИСТ ====================
    // Поддерживаем: объекты с type 'local' (src) или 'youtube' (videoId)
    const videoLibrary = [
      { name: "?", type: "youtube", videoId: "https://www.youtube.com/watch?v=GEHej0FyknI" },
      { name: "??", type: "youtube", videoId: "https://www.youtube.com/watch?v=3xuviCyR9uI" },  
      { name: "???", type: "youtube", videoId: "https://www.youtube.com/watch?v=qZF1JQh2HLE" },
      { name: "????", type: "youtube", videoId: "https://www.youtube.com/watch?v=VvM1OqbAZqU" },
    ];
    // Для демо, если локальных видео нет, добавляем тестовое (из интернета)
    if (videoLibrary.length === 0) videoLibrary.push({ name: "Демо момент", type: "local", src: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" });

    let currentIndex = 0;
    let currentPlayer = null;       // либо HTMLVideoElement, либо YouTube Player
    let playerType = null;          // 'local' или 'youtube'
    let isPlaying = false;
    let ytPlayer = null;            // объект YouTube Player
    let audioContext = null;
    let mediaSource = null;
    let analyser = null;
    let animationFrame = null;
    let volumeLevel = 0;            // 0..1

    // DOM элементы
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const timeDisplay = document.getElementById('timeDisplay');
    const titleElem = document.getElementById('currentVideoTitle');
    const playerContainer = document.getElementById('playerContainer');

    // ==================== Утилиты ====================
    function showToast(msg, type = 'info', duration = 2500) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerText = msg;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, duration);
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // ==================== Аудио-анализ (реакция на громкость) ====================
    async function connectAudioAnalyzer(videoElement) {
      if (!videoElement) return;
      if (audioContext) {
        await audioContext.close();
        audioContext = null;
      }
      if (mediaSource) mediaSource.disconnect();
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        mediaSource = audioContext.createMediaElementSource(videoElement);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 32;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        mediaSource.connect(analyser);
        analyser.connect(audioContext.destination);
        if (audioContext.state === 'suspended') await audioContext.resume();
        const updateVolume = () => {
          if (!analyser) return;
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
          volumeLevel = Math.min(1, sum / (dataArray.length * 255) * 1.5);
          requestAnimationFrame(updateVolume);
        };
        updateVolume();
      } catch (e) { console.warn("AudioContext error:", e); volumeLevel = 0.3; }
    }

    // ==================== Частицы с реакцией на громкость ====================
    function initSoundReactiveParticles() {
      const canvas = document.getElementById('particleCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let particles = [];
      const mouse = { x: 0, y: 0, radius: 120 };
      function resize() { canvas.width = window.innerWidth; canvas.height = Math.max(document.body.scrollHeight, window.innerHeight); }
      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2 + 1;
          this.speedX = (Math.random() - 0.5) * 0.5;
          this.speedY = (Math.random() - 0.5) * 0.5;
          this.hue = Math.random() * 360;
          this.baseSize = this.size;
        }
        update(vol) {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0) this.x = canvas.width;
          if (this.x > canvas.width) this.x = 0;
          if (this.y < 0) this.y = canvas.height;
          if (this.y > canvas.height) this.y = 0;
          const dx = this.x - mouse.x, dy = this.y - mouse.y;
          const dist = Math.hypot(dx, dy);
          if (dist < mouse.radius) {
            const force = (mouse.radius - dist) / mouse.radius;
            const angle = Math.atan2(dy, dx);
            this.x += Math.cos(angle) * force * 1.8;
            this.y += Math.sin(angle) * force * 1.8;
          }
          // реакция на громкость: размер частиц пульсирует
          const volumeFactor = 1 + vol * 2;
          this.size = this.baseSize * (0.6 + volumeFactor * 0.6);
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          const theme = document.body.getAttribute('data-theme');
          const alpha = theme === 'light' ? 0.6 : 0.4 + volumeLevel * 0.3;
          ctx.fillStyle = `hsla(${this.hue + volumeLevel * 50}, 75%, 60%, ${alpha})`;
          ctx.fill();
        }
      }
      function initParticles() { particles = []; for (let i = 0; i < 120; i++) particles.push(new Particle()); }
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(volumeLevel); p.draw(); });
        // соединительные линии
        for (let i = 0; i < particles.length; i++) {
          for (let j = i+1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.hypot(dx, dy);
            if (dist < 100) {
              ctx.beginPath();
              const alpha = 0.08 * (1 - dist/100) * (0.5 + volumeLevel);
              ctx.strokeStyle = `hsla(${(particles[i].hue + particles[j].hue)/2}, 70%, 60%, ${alpha})`;
              ctx.lineWidth = 0.6;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animate);
      }
      window.addEventListener('resize', () => { resize(); initParticles(); });
      canvas.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
      resize(); initParticles(); animate();
    }

    // ==================== Управление плеером ====================
    function destroyCurrentPlayer() {
      if (ytPlayer && typeof ytPlayer.destroy === 'function') ytPlayer.destroy();
      ytPlayer = null;
      if (currentPlayer && currentPlayer.pause) currentPlayer.pause();
      playerContainer.innerHTML = '';
      if (audioContext) { audioContext.close().catch(e=>{}); audioContext = null; }
    }

    function loadVideo(index) {
      if (!videoLibrary[index]) { showToast("Момент не найден", "error"); return false; }
      destroyCurrentPlayer();
      const item = videoLibrary[index];
      titleElem.innerText = item.name;
      currentIndex = index;
      if (item.type === 'youtube' && item.videoId) {
        playerType = 'youtube';
        const iframeDiv = document.createElement('div');
        iframeDiv.id = 'youtubePlayer';
        iframeDiv.style.width = '100%';
        iframeDiv.style.height = '100%';
        playerContainer.appendChild(iframeDiv);
        // инициализация YouTube плеера
        if (window.YT && YT.Player) {
          ytPlayer = new YT.Player('youtubePlayer', {
            videoId: item.videoId,
            playerVars: { autoplay: 0, controls: 0, modestbranding: 1, rel: 0 },
            events: {
              onReady: (event) => {
                currentPlayer = event.target;
                isPlaying = false;
                playPauseBtn.innerHTML = '▶ Воспр.';
                updateTimeForYouTube();
                // Для YouTube используем имитацию громкости (рандомная пульсация)
                setInterval(() => { if (playerType === 'youtube' && isPlaying) volumeLevel = 0.2 + Math.random() * 0.5; else if(!isPlaying) volumeLevel = 0.1; }, 200);
              },
              onStateChange: (e) => {
                if (e.data === YT.PlayerState.PLAYING) { isPlaying = true; playPauseBtn.innerHTML = '⏸ Пауза'; }
                else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) { isPlaying = false; playPauseBtn.innerHTML = '▶ Воспр.'; }
                if (e.data === YT.PlayerState.ENDED) nextVideo();
              }
            }
          });
        } else {
          showToast("YouTube API не загружен, попробуйте обновить", "error");
          return false;
        }
      } else {
        playerType = 'local';
        const videoElem = document.createElement('video');
        videoElem.className = 'local-video';
        videoElem.src = item.src;
        videoElem.preload = 'metadata';
        videoElem.style.width = '100%';
        videoElem.style.height = '100%';
        playerContainer.appendChild(videoElem);
        currentPlayer = videoElem;
        isPlaying = false;
        playPauseBtn.innerHTML = '▶ Воспр.';
        videoElem.addEventListener('loadedmetadata', () => { updateTimeDisplay(); });
        videoElem.addEventListener('timeupdate', () => { updateProgressAndTime(); });
        videoElem.addEventListener('ended', () => nextVideo());
        videoElem.addEventListener('play', () => { isPlaying = true; playPauseBtn.innerHTML = '⏸ Пауза'; });
        videoElem.addEventListener('pause', () => { isPlaying = false; playPauseBtn.innerHTML = '▶ Воспр.'; });
        // Подключаем аудиоанализ для громкости
        videoElem.addEventListener('canplay', () => { connectAudioAnalyzer(videoElem); });
        if (videoElem.readyState >= 2) connectAudioAnalyzer(videoElem);
        else videoElem.addEventListener('canplay', () => connectAudioAnalyzer(videoElem), { once: true });
      }
      return true;
    }

    function updateProgressAndTime() {
      if (!currentPlayer || playerType !== 'local') return;
      const dur = currentPlayer.duration;
      const cur = currentPlayer.currentTime;
      if (!isNaN(dur) && dur !== Infinity) {
        progressFill.style.width = (cur / dur) * 100 + '%';
        timeDisplay.innerText = `${formatTime(cur)} / ${formatTime(dur)}`;
      }
    }
    function updateTimeForYouTube() {
      if (!ytPlayer || playerType !== 'youtube') return;
      const interval = setInterval(() => {
        if (playerType === 'youtube' && ytPlayer && ytPlayer.getCurrentTime) {
          const cur = ytPlayer.getCurrentTime();
          const dur = ytPlayer.getDuration();
          if (dur) {
            progressFill.style.width = (cur / dur) * 100 + '%';
            timeDisplay.innerText = `${formatTime(cur)} / ${formatTime(dur)}`;
          }
        } else clearInterval(interval);
      }, 250);
      window._ytInterval = interval;
    }
    function togglePlayPause() {
      if (!currentPlayer) return;
      if (playerType === 'local') {
        if (isPlaying) currentPlayer.pause();
        else currentPlayer.play();
      } else if (playerType === 'youtube' && ytPlayer) {
        if (isPlaying) ytPlayer.pauseVideo();
        else ytPlayer.playVideo();
      }
    }
    function nextVideo() { let next = (currentIndex + 1) % videoLibrary.length; loadVideo(next); }
    function prevVideo() { let prev = (currentIndex - 1 + videoLibrary.length) % videoLibrary.length; loadVideo(prev); }

    // ==================== Полноэкранный режим (клавиша F) ====================
    function toggleFullscreen() {
      const container = document.querySelector('.video-wrapper');
      if (!container) return;
      if (!document.fullscreenElement) {
        container.requestFullscreen().catch(err => showToast(`Ошибка fullscreen: ${err}`, 'error'));
      } else {
        document.exitFullscreen();
      }
    }

    // ==================== Жесты (свайп) ====================
    let touchStartX = 0;
    let touchEndX = 0;
    const wrapper = document.querySelector('.video-wrapper');
    wrapper.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
    wrapper.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchEndX - touchStartX;
      if (Math.abs(diff) > 60) {
        if (diff > 0) prevVideo();
        else nextVideo();
        showToast(diff > 0 ? '← Предыдущий' : 'Следующий →', 'info', 1000);
      }
    });

    // ==================== Меню, тема, курсор ====================
    function toggleMenu() { document.getElementById('burgerBtn').classList.toggle('active'); document.getElementById('menu').classList.toggle('active'); }
    function closeMenu() { document.getElementById('burgerBtn').classList.remove('active'); document.getElementById('menu').classList.remove('active'); document.querySelectorAll('.submenu').forEach(s=>s.classList.remove('show')); document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active')); }
    function toggleSubmenu(id, btn) { const sub = document.getElementById(id); const show = sub.classList.contains('show'); closeAllSubmenus(); if (!show) { sub.classList.add('show'); btn.classList.add('active'); } }
    function closeAllSubmenus() { document.querySelectorAll('.submenu').forEach(s=>s.classList.remove('show')); document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active')); }
    function initTheme() { const saved = localStorage.getItem('theme') || 'dark'; document.body.setAttribute('data-theme', saved); document.getElementById('themeToggle').checked = saved === 'light'; }
    function toggleTheme() { const isLight = document.getElementById('themeToggle').checked; document.body.setAttribute('data-theme', isLight ? 'light' : 'dark'); localStorage.setItem('theme', isLight ? 'light' : 'dark'); }
    function initCursor() { const enabled = localStorage.getItem('customCursor') !== 'disabled'; document.getElementById('cursorToggle').checked = enabled; if (enabled) document.body.classList.add('custom-cursor'); else document.body.classList.remove('custom-cursor'); document.getElementById('cursorToggle').addEventListener('change', (e) => { if(e.target.checked) { document.body.classList.add('custom-cursor'); localStorage.setItem('customCursor','enabled'); } else { document.body.classList.remove('custom-cursor'); localStorage.setItem('customCursor','disabled'); } }); }
    document.addEventListener('mousemove', (e) => { if(document.body.classList.contains('custom-cursor')) { const cur = document.querySelector('.custom-cursor-element'); if(cur) { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; } } });
    function buildMomentsSubmenu() { const container = document.getElementById('momentsSubmenu'); container.innerHTML = ''; videoLibrary.forEach((v,i) => { const div = document.createElement('div'); div.className = 'video-item'; div.innerHTML = `🎬 ${v.name}`; div.onclick = () => { loadVideo(i); if(document.getElementById('menu').classList.contains('active')) toggleMenu(); setTimeout(()=>togglePlayPause(), 300); }; container.appendChild(div); }); }

    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      initTheme(); initCursor(); buildMomentsSubmenu(); initSoundReactiveParticles();
      document.getElementById('themeToggle').addEventListener('change', toggleTheme);
      document.getElementById('burgerBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
      document.addEventListener('click', (e) => { const menu=document.getElementById('menu'); if(menu.classList.contains('active') && !menu.contains(e.target) && !document.getElementById('burgerBtn').contains(e.target)) closeMenu(); });
      playPauseBtn.addEventListener('click', togglePlayPause);
      prevBtn.addEventListener('click', prevVideo);
      nextBtn.addEventListener('click', nextVideo);
      progressBar.addEventListener('click', (e) => { if(playerType==='local' && currentPlayer) { const rect=progressBar.getBoundingClientRect(); const percent=(e.clientX-rect.left)/rect.width; currentPlayer.currentTime=percent*currentPlayer.duration; } else if(playerType==='youtube' && ytPlayer) { const rect=progressBar.getBoundingClientRect(); const percent=(e.clientX-rect.left)/rect.width; const dur=ytPlayer.getDuration(); if(dur) ytPlayer.seekTo(percent*dur, true); } });
      document.addEventListener('keydown', (e) => { if(e.code === 'KeyF') { e.preventDefault(); toggleFullscreen(); } if(e.code === 'Space') { e.preventDefault(); togglePlayPause(); } if(e.code === 'ArrowRight') nextVideo(); if(e.code === 'ArrowLeft') prevVideo(); });
      loadVideo(0);
    });
    function goBack() { window.history.back(); }
  </script>
</body>
</html>
